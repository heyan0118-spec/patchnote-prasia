<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프라시아 전기 — 패치노트 검색</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="container">
  <header>
    <h1><a href="/" id="homeLink" style="text-decoration: none; color: inherit;"><span>프라시아 전기</span> 패치노트 검색</a></h1>
    <p>공지 및 업데이트 내역을 자연어로 검색하세요</p>
  </header>

  <div class="search-box">
    <form id="searchForm" class="search-row">
      <input type="text" id="questionInput" placeholder="예: 2025년 클래스 체인지 진행 기간 정리해줘" autocomplete="off" />
      <button type="submit" class="btn-search" id="searchBtn">검색</button>
    </form>
    <div class="filters">
      <label>주제
        <select id="filterTopic">
          <option value="">전체</option>
          <option value="class">클래스</option>
          <option value="balance">밸런스</option>
          <option value="event">이벤트</option>
          <option value="system">시스템</option>
          <option value="item">아이템</option>
          <option value="content">콘텐츠</option>
          <option value="world_open">월드 오픈</option>
          <option value="maintenance">점검</option>
        </select>
      </label>
      <label>시작일 <input type="date" id="filterDateFrom" /></label>
      <label>종료일 <input type="date" id="filterDateTo" /></label>
    </div>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>검색 중…</div>
  </div>

  <div class="answer-box" id="answerBox"></div>
  <div id="results"></div>

  <div class="empty-state" id="emptyState">
    <div class="icon">&#128270;</div>
    <p>질문을 입력하면 관련 패치노트를 찾아드립니다</p>
    <div class="examples">
      <div id="recentSearches" class="recent-box" style="display: none; margin-bottom: 2rem;">
        <h3 style="font-size: 0.9rem; color: var(--text-dim); margin-bottom: 0.75rem;">최근 검색어</h3>
        <div id="recentChips" class="example-chips"></div>
      </div>

      <h3>검색 예시</h3>
      <div class="example-chips">
        <span class="example-chip" data-q="2025년 클래스 체인지 진행 기간 정리해줘">클래스 체인지 이력</span>
        <span class="example-chip" data-q="최근 아처 스킬 변경 내역">아처 스킬 변경</span>
        <span class="example-chip" data-q="올해 출석 이벤트 일정">출석 이벤트</span>
        <span class="example-chip" data-q="최근 서버 점검 내역">서버 점검</span>
        <span class="example-chip" data-q="월드 오픈 이벤트 진행 기간">월드 오픈</span>
      </div>
    </div>
  </div>

  <footer>
    프라시아 전기 패치노트 검색 &middot; 데이터 출처: 넥슨 공식 커뮤니티
  </footer>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
